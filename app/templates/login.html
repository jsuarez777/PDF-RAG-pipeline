<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ 'Sign up' if mode == 'signup' else 'Log in' }} — PDF Scans</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         min-height: 100vh; display: flex; align-items: center; justify-content: center;
         background: #f5f5f7; color: #1d1d1f; }
  .card { background: #fff; border: 1px solid #ddd; border-radius: 12px;
          box-shadow: 0 4px 16px rgba(0,0,0,.08); padding: 32px; width: 340px; }
  h1 { font-size: 18px; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #6e6e73; margin-bottom: 20px; }
  label { display: block; font-size: 13px; color: #6e6e73; margin-bottom: 14px; }
  input { display: block; width: 100%; margin-top: 4px; padding: 8px 10px;
          font-size: 14px; border: 1px solid #ccc; border-radius: 6px; }
  input:focus { outline: none; border-color: #0071e3; }
  button { width: 100%; padding: 9px 14px; border: 1px solid #0071e3; border-radius: 6px;
           background: #0071e3; color: #fff; cursor: pointer; font-size: 14px; }
  button:hover { background: #0077ed; }
  .error { background: #fdecea; color: #b3261e; border: 1px solid #f5c6c0;
           border-radius: 6px; padding: 8px 10px; font-size: 13px; margin-bottom: 14px; }
  .alt { font-size: 13px; color: #6e6e73; text-align: center; margin-top: 18px; }
  .alt a { color: #0071e3; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <h1>PDF Scans</h1>
  <p class="sub">{{ 'Create an account' if mode == 'signup' else 'Log in to your workspace' }}</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post" action="{{ '/signup' if mode == 'signup' else '/login' }}">
    <label>Username
      <input name="username" value="{{ username }}" autofocus required
             autocomplete="username">
    </label>
    <label>Password
      <input name="password" type="password" required
             autocomplete="{{ 'new-password' if mode == 'signup' else 'current-password' }}">
      {% if mode == 'signup' %}<small>At least 8 characters</small>{% endif %}
    </label>
    <button type="submit">{{ 'Sign up' if mode == 'signup' else 'Log in' }}</button>
  </form>
  <p class="alt">
    {% if mode == 'signup' %}
      Already have an account? <a href="/login">Log in</a>
    {% else %}
      New here? <a href="/signup">Sign up</a>
    {% endif %}
  </p>
</div>
</body>
</html>
