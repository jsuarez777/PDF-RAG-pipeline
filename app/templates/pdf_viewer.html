<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PDF Scans</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         height: 100vh; display: flex; flex-direction: column; background: #f5f5f7; color: #1d1d1f; }
  header { display: flex; align-items: center; gap: 12px; padding: 10px 16px;
           background: #fff; border-bottom: 1px solid #ddd; }
  header h1 { font-size: 16px; }
  #head-spacer { flex: 1; }
  button { padding: 6px 14px; border: 1px solid #ccc; border-radius: 6px;
           background: #fff; cursor: pointer; font-size: 13px; }
  button:hover { background: #f0f0f0; }
  button:disabled, button:disabled:hover { background: #f5f5f7; color: #b0b0b5;
                                           border-color: #e0e0e0; cursor: default; }
  button.primary { background: #0071e3; border-color: #0071e3; color: #fff; }
  button.primary:hover { background: #0077ed; }
  #status { font-size: 13px; color: #6e6e73; }

  /* Upload menu */
  #upload-wrap { position: relative; }
  #upload-menu { position: absolute; right: 0; top: calc(100% + 4px); z-index: 10;
                 background: #fff; border: 1px solid #ccc; border-radius: 8px;
                 box-shadow: 0 4px 16px rgba(0,0,0,.15); display: flex;
                 flex-direction: column; min-width: 230px; overflow: hidden; }
  #upload-menu button { border: none; border-radius: 0; text-align: left;
                        padding: 10px 14px; }
  #upload-menu button + button { border-top: 1px solid #eee; }
  #upload-menu[hidden] { display: none; }
  #upload-menu small { display: block; color: #6e6e73; }

  /* Document list view */
  #list-view { flex: 1; overflow-y: auto; padding: 20px; }
  #doc-columns { display: flex; gap: 24px; align-items: flex-start; }
  .doc-col { flex: 1; min-width: 0; }
  .doc-col h2 { font-size: 14px; color: #6e6e73; margin-bottom: 10px; }
  .doc-col .empty { color: #9a9a9e; font-size: 13px; font-style: italic; }
  .doc-item { display: flex; justify-content: space-between; padding: 10px 14px;
              background: #fff; border: 1px solid #e0e0e0; border-radius: 8px;
              margin-bottom: 6px; cursor: pointer; font-size: 14px; }
  .doc-item:hover { border-color: #0071e3; }
  .doc-item .pages { color: #6e6e73; font-size: 13px; }
  #empty { color: #6e6e73; font-size: 14px; padding: 20px 0; }

  /* Viewer */
  #viewer { flex: 1; display: none; min-height: 0; }
  #thumbs { width: 20%; min-width: 120px; overflow-y: auto; padding: 10px;
            background: #fff; border-right: 1px solid #ddd; }
  .thumb { border: 2px solid transparent; border-radius: 6px; padding: 4px;
           cursor: pointer; margin-bottom: 8px; text-align: center; }
  .thumb.selected { border-color: #0071e3; background: #eaf3fe; }
  .thumb img { width: 100%; display: block; border: 1px solid #e0e0e0; }
  .thumb .label { font-size: 12px; color: #6e6e73; margin-top: 4px; }
  #divider { width: 5px; cursor: col-resize; background: #ddd; flex-shrink: 0; }
  #divider:hover, #divider.dragging { background: #0071e3; }
  #preview { flex: 1; overflow-y: auto; padding: 16px; }
  #preview .placeholder { color: #6e6e73; display: block; text-align: center; margin-top: 40px; }
  .page-row { display: flex; gap: 16px; align-items: flex-start; padding: 12px;
              border-radius: 8px; border: 2px solid transparent;
              border-bottom: 1px solid #ddd; margin-bottom: 16px; }
  .page-row.selected { border-color: #0071e3; background: #eaf3fe; }
  .page-row .img-col { width: 46%; flex-shrink: 0; }
  .page-row .action-col { flex-shrink: 0; display: flex; align-items: flex-start; }
  .page-row .action-col button { font-size: 11px; padding: 4px 8px; white-space: nowrap; }
  .page-row .img-col img { width: 100%; display: block;
                           box-shadow: 0 2px 12px rgba(0,0,0,.15); }
  .page-row .ocr-col { width: 50%; font-size: 13px; line-height: 1.6;
                       white-space: pre-wrap; overflow-wrap: break-word; }
  .page-row .ocr-col h3 { font-size: 12px; color: #6e6e73; font-weight: 600;
                          margin-bottom: 8px; }
  .page-row .ocr-col .no-ocr { color: #9a9a9e; font-style: italic; }
  .plumber-table { border-collapse: collapse; margin-top: 10px; font-size: 12px;
                   white-space: normal; }
  .plumber-table td { border: 1px solid #ccc; padding: 3px 8px; }
  .ocr-col h4 { font-size: 11px; color: #6e6e73; font-weight: 600;
                text-transform: uppercase; letter-spacing: .04em;
                margin: 14px 0 4px; padding-top: 8px; border-top: 1px solid #eee; }
  .ocr-col h4:first-of-type { margin-top: 6px; border-top: none; padding-top: 0; }
  .ocr-col .none { color: #9a9a9e; font-style: italic; }
  .plumber-image { margin: 8px 0; white-space: normal; }
  .plumber-image img { max-width: 60%; display: block; border: 1px solid #e0e0e0;
                       box-shadow: 0 1px 6px rgba(0,0,0,.12); }
  .plumber-image figcaption { font-size: 11px; color: #6e6e73; margin-top: 3px; }
  .ocr-col details summary { cursor: pointer; font-size: 12px; color: #6e6e73; }
  .ocr-col details[open] summary { margin-bottom: 6px; }

  /* Chunk rectangles drawn around chunk text in the text column:
     orange = has QA pairs, green = no QA pairs yet, white = clicked/active */
  .chunk-box { display: block; border: 2px solid; border-radius: 6px;
               padding: 4px 6px; margin: 6px 0; cursor: pointer; }
  .chunk-box.has-qa { border-color: #e3652b; }
  .chunk-box.has-qa .chunk-box-label { color: #e3652b; }
  .chunk-box.no-qa { border-color: #34a853; }
  .chunk-box.no-qa .chunk-box-label { color: #34a853; }
  .chunk-box.active { border-color: #fff; background: #fff;
                      box-shadow: 0 0 0 1px rgba(0,0,0,.12), 0 2px 12px rgba(0,0,0,.28); }
  .chunk-box.active .chunk-box-label { color: #1d1d1f; }
  .chunk-box-head { display: flex; justify-content: space-between;
                    align-items: center; gap: 8px; }
  .chunk-box-label { display: block; font-size: 10px; font-weight: 700;
                     letter-spacing: .03em; margin-bottom: 2px; }
  .chunk-check { margin: 0; cursor: pointer; }
  .chunk-gen { display: block; font-size: 11px; padding: 3px 8px; margin: 2px 0 6px; }
  /* overlap seams: text shared between consecutive chunks */
  .ov-shared { background: rgba(0,0,0,.10); border-radius: 3px; }
  .ov-dup { background: rgba(0,0,0,.06); color: #6e6e73; border-radius: 3px; }
  /* interleaved-border mode: pull a box up over the previous box's shared tail */
  .chunk-box.overlaps-prev { margin-top: -30px; padding-top: 28px;
                             border-top-style: dashed; }

  /* QA pane (third pane in the viewer) */
  #qa-pane { width: 28%; min-width: 240px; overflow-y: auto; padding: 12px;
             background: #fff; border-left: 1px solid #ddd; }
  #qa-pane h2 { font-size: 13px; color: #6e6e73; margin-bottom: 10px;
                overflow-wrap: break-word; }
  .qa-item { border: 1px solid #e0e0e0; border-radius: 8px; padding: 10px;
             margin-bottom: 10px; cursor: pointer; }
  .qa-item:hover { border-color: #0071e3; }
  .qa-item-head { display: flex; justify-content: space-between; gap: 8px;
                  font-size: 13px; font-weight: 600; }
  .qa-item-head .qa-chunk { color: #e3652b; }
  .qa-item-head .qa-page { color: #6e6e73; font-weight: 400; font-size: 12px; }
  .qa-pair { margin-top: 8px; font-size: 12.5px; line-height: 1.45; }
  .qa-pair-head { display: flex; justify-content: space-between; align-items: center; }
  .qa-type { display: inline-block; font-size: 10px; text-transform: uppercase;
             letter-spacing: .04em; color: #6e6e73; background: #f0f0f2;
             border-radius: 4px; padding: 1px 6px; margin-bottom: 2px; }
  .qa-del { font-size: 10px; padding: 2px 8px; }
  .qa-q { font-weight: 500; }
  .qa-a { color: #3a3a3c; margin-top: 2px; }

  /* Eval selector at the top of the QA pane + per-pair rank line */
  #eval-bar { display: flex; align-items: center; gap: 8px; padding: 8px;
              margin-bottom: 10px; background: #f5f5f7; border: 1px solid #e0e0e0;
              border-radius: 8px; font-size: 12px; color: #6e6e73; }
  #eval-bar select { flex: 1; min-width: 0; font-size: 12px; padding: 4px 6px;
                     border: 1px solid #ccc; border-radius: 6px; background: #fff; }
  .qa-eval { display: flex; align-items: center; gap: 8px; margin-top: 4px;
             font-size: 11.5px; }
  .qa-eval .qa-rank { font-weight: 600; color: #0071e3; }
  .qa-eval .qa-rank.miss { color: #d93025; }
  .qa-eval button { font-size: 10px; padding: 2px 8px; }

  /* Anchored popovers (eval full results, chunk preview): open next to the
     button that was clicked, like a context menu — no page dimming */
  .popover { position: fixed; z-index: 100; background: #fff;
             border: 1px solid #ccc; border-radius: 10px; width: 380px;
             max-width: calc(100vw - 16px); max-height: 55vh;
             display: flex; flex-direction: column;
             box-shadow: 0 8px 32px rgba(0,0,0,.25); }
  .popover-head { display: flex; align-items: center; gap: 8px;
                  padding: 8px 12px; border-bottom: 1px solid #eee; }
  .popover-head h3 { flex: 1; font-size: 13px; overflow-wrap: anywhere; }
  .popover-head button { font-size: 11px; padding: 1px 7px; }
  .popover-body { overflow-y: auto; padding: 10px 12px; font-size: 13px;
                  line-height: 1.5; }
  .rank-row { display: flex; align-items: center; gap: 10px; padding: 5px 0;
              border-bottom: 1px solid #f0f0f2; }
  .rank-row .rank-no { width: 34px; color: #6e6e73; font-size: 12px;
                       text-align: right; flex-shrink: 0; }
  .rank-row .rank-score { margin-left: auto; color: #6e6e73; font-size: 12px; }
  .rank-row .gold { color: #e3652b; font-weight: 600; font-size: 11px; }
  .chunk-preview { white-space: pre-wrap; overflow-wrap: break-word;
                   background: #f5f5f7; border-radius: 6px; padding: 10px;
                   margin-top: 10px; font-size: 12.5px; }

  /* Bottom log pane */
  #log-divider { height: 5px; cursor: row-resize; background: #ddd; flex-shrink: 0; }
  #log-divider:hover, #log-divider.dragging { background: #0071e3; }
  #log-pane { height: 140px; flex-shrink: 0; display: flex; flex-direction: column;
              background: #1d1d1f; color: #d4d4d4; }
  #log-header { display: flex; align-items: center; padding: 4px 10px;
                font-size: 12px; color: #9a9a9e; }
  #log-header span { flex: 1; }
  #log-header button { padding: 2px 8px; font-size: 11px; background: transparent;
                       color: #9a9a9e; border-color: #48484a; }
  #log-header button:hover { background: #2c2c2e; }
  #log { flex: 1; overflow-y: auto; padding: 0 10px 8px;
         font-family: "SF Mono", Menlo, monospace; font-size: 12px;
         line-height: 1.5; white-space: pre-wrap; }
</style>
</head>
<body>
<header>
  <h1 id="title">Scanned documents</h1>
  <button id="qa-btn" style="display:none" disabled>View QA Pairs</button>
  <button id="gen-btn" style="display:none" disabled>Generate QA Pairs for Selected</button>
  <button id="deselect-btn" style="display:none" disabled>Deselect All</button>
  <span id="head-spacer"></span>
  <span id="status"></span>
  <button id="extract-all" style="display:none">Extract all via EasyOCR</button>
  <button id="back" style="display:none">&larr; All documents</button>
  <div id="upload-wrap">
    <button id="upload-btn" class="primary">Load PDF&hellip;</button>
    <div id="upload-menu" hidden>
      <button data-method="pdf2image">Convert to images<small>pdf2image &mdash; page PNGs, OCR-ready</small></button>
      <button data-method="pdfplumber">Extract text<small>pdfplumber &mdash; text and tables</small></button>
    </div>
  </div>
  <input type="file" id="file-input" accept=".pdf,application/pdf" hidden>
</header>

<div id="list-view">
  <div id="doc-columns">
    <div class="doc-col">
      <h2>pdf2image &mdash; page images</h2>
      <div class="doc-list" data-type="pdf2image"></div>
      <div class="empty" hidden>No documents yet.</div>
    </div>
    <div class="doc-col">
      <h2>pdfplumber &mdash; extracted text</h2>
      <div class="doc-list" data-type="pdfplumber"></div>
      <div class="empty" hidden>No documents yet.</div>
    </div>
  </div>
</div>

<div id="viewer">
  <div id="thumbs"></div>
  <div id="divider"></div>
  <div id="preview"><span class="placeholder">Select a page on the left</span></div>
  <div id="qa-pane" hidden></div>
</div>

<div id="log-divider"></div>
<div id="log-pane">
  <div id="log-header">
    <span>Logs</span>
    <button id="log-clear">Clear</button>
  </div>
  <div id="log"></div>
</div>

<script>
const $ = id => document.getElementById(id);
let current = null;
let ocrState = {};  // page number -> extracted text, or null when not yet OCR'd
let qaData = null;      // latest QA dataset for the open document, or null
let qaVisible = false;
let pageTexts = {};    // page number -> chunk-source text (null when unavailable)
let pageTextEls = {};  // page number -> element the text is rendered into
let checkedChunks = new Set();  // chunk indices ticked for bulk generation
let activeChunk = null;         // chunk whose box was clicked (white, gen button)
let generating = false;
let evalList = [];       // eval files available for the loaded QA file
let evalData = null;     // loaded eval file (questions + chunk_texts), or null
let evalSelected = '';   // filename of the selected eval, '' = None

function refreshExtractAll() {
  const missing = Object.values(ocrState).filter(t => t === null).length;
  const btn = $('extract-all');
  if (current && current.type === 'pdf2image' && missing > 0) {
    btn.textContent = `Extract all via EasyOCR (${missing} page${missing > 1 ? 's' : ''} missing)`;
    btn.style.display = '';
  } else {
    btn.style.display = 'none';
  }
}

async function loadDocuments() {
  const docs = await (await fetch('/api/documents')).json();
  document.querySelectorAll('.doc-list').forEach(list => {
    const type = list.dataset.type;
    const mine = docs.filter(d => d.type === type);
    list.innerHTML = '';
    list.parentElement.querySelector('.empty').hidden = mine.length > 0;
    for (const doc of mine) {
      const item = document.createElement('div');
      item.className = 'doc-item';
      item.innerHTML = `<span>${doc.run}/${doc.name}</span><span class="pages">${doc.pages} page(s)</span>`;
      item.onclick = () => openDocument(doc);
      list.appendChild(item);
    }
  });
}

function showViewer(doc) {
  current = doc;
  ocrState = {};
  qaData = null;
  qaVisible = false;
  pageTexts = {};
  pageTextEls = {};
  checkedChunks = new Set();
  activeChunk = null;
  evalList = [];
  evalData = null;
  evalSelected = '';
  $('qa-pane').hidden = true;
  refreshGenButton();
  refreshExtractAll();
  $('list-view').style.display = 'none';
  $('viewer').style.display = 'flex';
  $('back').style.display = '';
  $('title').textContent = `${doc.type}: ${doc.run}/${doc.name}`;
  $('thumbs').innerHTML = '';
  $('preview').innerHTML = '';
  loadQa(doc);
}

async function loadQa(doc) {
  const btn = $('qa-btn');
  btn.style.display = '';
  btn.disabled = true;
  btn.textContent = 'View QA Pairs';
  try {
    const resp = await fetch(`/api/documents/${doc.type}/${doc.run}/${doc.name}/qa`);
    if (!resp.ok) return;
    const data = await resp.json();
    if (current !== doc) return;  // user navigated away meanwhile
    if (data && data.items && data.items.length) {
      qaData = data;
      btn.disabled = false;
      loadEvalList(doc);
    }
  } catch (err) { /* leave the button grayed out */ }
}

function selectFirstPage() {
  const first = $('thumbs').querySelector('.thumb');
  if (first) {
    first.classList.add('selected');
    const firstRow = $('preview').querySelector('.page-row');
    if (firstRow) firstRow.classList.add('selected');
    $('preview').scrollTop = 0;
  }
}

async function openDocument(doc) {
  if (doc.type === 'pdfplumber') return openPlumberDocument(doc);
  showViewer(doc);

  const base = `/api/documents/${doc.run}/${doc.name}`;
  const [pages, ocr] = await Promise.all([
    fetch(`${base}/pages`).then(r => r.json()),
    fetch(`${base}/ocr`).then(r => r.json()),
  ]);
  ocrState = ocr;
  refreshExtractAll();

  const thumbs = $('thumbs');
  const preview = $('preview');

  pages.forEach(file => {
    const pageNo = file.match(/page_(\d+)\.png/)[1];
    const url = `/images/pdf2image/${doc.run}/${doc.name}/${file}`;

    // Preview row: image left, OCR text right, aligned per page.
    const row = document.createElement('div');
    row.className = 'page-row';
    row.id = `page-row-${pageNo}`;
    const text = ocr[pageNo];
    row.innerHTML = `
      <div class="img-col"><img src="${url}" loading="lazy"></div>
      <div class="action-col"><button>Extract text (easyocr)</button></div>
      <div class="ocr-col"><h3>Page ${pageNo} — EasyOCR</h3><div class="ocr-text"></div></div>`;
    setOcrText(row, text);
    pageTexts[pageNo] = text;
    pageTextEls[pageNo] = row.querySelector('.ocr-text');
    row.querySelector('.action-col button').onclick = ev => extractPage(ev.target, doc, pageNo, row);
    preview.appendChild(row);

    const t = document.createElement('div');
    t.className = 'thumb';
    t.innerHTML = `<img src="${url}" loading="lazy"><div class="label">Page ${pageNo}</div>`;
    t.onclick = () => selectPage(t, row);
    thumbs.appendChild(t);
  });

  selectFirstPage();
}

async function openPlumberDocument(doc) {
  showViewer(doc);
  const pages = await (
    await fetch(`/api/documents/pdfplumber/${doc.run}/${doc.name}/content`)
  ).json();
  const thumbs = $('thumbs');
  const preview = $('preview');

  pages.forEach(p => {
    const url = `/images/pdfplumber/${doc.run}/${doc.name}/page_${p.page}.png`;
    const row = document.createElement('div');
    row.className = 'page-row';
    row.id = `page-row-${p.page}`;
    row.innerHTML = `
      <div class="img-col"><img src="${url}" loading="lazy" onerror="this.style.display='none'"></div>
      <div class="ocr-col"><h3>Page ${p.page} — pdfplumber</h3></div>`;
    const col = row.querySelector('.ocr-col');
    const addHeading = label => {
      const h = document.createElement('h4');
      h.textContent = label;
      col.appendChild(h);
    };
    const addNone = label => {
      const span = document.createElement('span');
      span.className = 'none';
      span.textContent = label;
      col.appendChild(span);
    };

    addHeading('Prose');
    if (p.text) {
      const div = document.createElement('div');
      div.append(p.text);
      col.appendChild(div);
    } else addNone('(no prose on this page)');

    addHeading(`Tables (${p.tables.length})`);
    if (!p.tables.length) addNone('(none)');
    for (const tableRows of p.tables) {
      const table = document.createElement('table');
      table.className = 'plumber-table';
      for (const cells of tableRows) {
        const tr = table.insertRow();
        for (const cell of cells) tr.insertCell().append(cell ?? '');
      }
      col.appendChild(table);
    }

    const images = p.images || [];
    addHeading(`Images (${images.length})`);
    if (!images.length) addNone('(none)');
    for (const img of images) {
      const fig = document.createElement('figure');
      fig.className = 'plumber-image';
      const el = document.createElement('img');
      el.src = `/images/pdfplumber/${doc.run}/${doc.name}/${img.file}`;
      el.loading = 'lazy';
      const cap = document.createElement('figcaption');
      const b = img.bbox;
      cap.textContent = `#${img.image_number} ${img.file} — bbox (${b.x0.toFixed(1)}, ${b.top.toFixed(1)}) → (${b.x1.toFixed(1)}, ${b.bottom.toFixed(1)}), source ${img.source_size[0]}×${img.source_size[1]}px`;
      fig.append(el, cap);
      col.appendChild(fig);
    }

    addHeading('All text');
    const details = document.createElement('details');
    const summary = document.createElement('summary');
    summary.textContent = 'Show full unfiltered extraction';
    const fullDiv = document.createElement('div');
    fullDiv.append(p.full_text || '(no text on this page)');
    pageTexts[p.page] = p.full_text || '';
    pageTextEls[p.page] = fullDiv;
    details.append(summary, fullDiv);
    col.appendChild(details);
    preview.appendChild(row);

    const t = document.createElement('div');
    t.className = 'thumb';
    t.innerHTML = `<img src="${url}" loading="lazy" onerror="this.style.display='none'"><div class="label">Page ${p.page}</div>`;
    t.onclick = () => selectPage(t, row);
    thumbs.appendChild(t);
  });

  selectFirstPage();
}

function setOcrText(row, text) {
  const target = row.querySelector('.ocr-text');
  target.innerHTML = '';
  if (text === null) {
    target.innerHTML = '<span class="no-ocr">No OCR data — click "Extract text (easyocr)".</span>';
  } else {
    target.append(text);
  }
}

async function extractPage(button, doc, pageNo, row) {
  button.disabled = true;
  button.textContent = 'Extracting…';
  try {
    const resp = await fetch(`/api/documents/${doc.run}/${doc.name}/ocr/${pageNo}`, { method: 'POST' });
    if (!resp.ok) throw new Error(await resp.text());
    const data = await resp.json();
    setOcrText(row, data.extracted_text);
    ocrState[pageNo] = data.extracted_text;
    pageTexts[pageNo] = data.extracted_text;
    refreshExtractAll();
    renderChunkHighlights();
  } catch (err) {
    setOcrText(row, null);
    row.querySelector('.ocr-text').insertAdjacentText('afterbegin', 'Extraction failed — see logs. ');
  } finally {
    button.disabled = false;
    button.textContent = 'Extract text (easyocr)';
  }
}

function selectPage(thumb, row) {
  document.querySelectorAll('.thumb.selected, .page-row.selected')
    .forEach(el => el.classList.remove('selected'));
  thumb.classList.add('selected');
  row.classList.add('selected');
  row.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* Chunk boxes: chunks were cut from the page texts joined with "\n" (see
   chunk_text.py), so each page's slice of a chunk's [start_char, end_char)
   span can be recovered from cumulative page-text offsets. Every chunk gets
   a box; overlap between consecutive chunks is drawn inside the earlier one. */
function renderChunkHighlights() {
  const order = Object.keys(pageTexts).map(Number).sort((a, b) => a - b);
  const perPage = {};  // page -> [{s, e, chunk}] in page-local coordinates
  const qaChunks = new Set((qaData ? qaData.items : []).map(it => it.chunk_index));
  if (qaVisible && qaData) {
    let pos = 0;
    const spans = order.map((n, i) => {
      if (i > 0) pos += 1;  // "\n" joining consecutive pages
      const len = (pageTexts[n] || '').length;
      const span = { page: n, start: pos, end: pos + len };
      pos += len;
      return span;
    });
    for (const c of qaData.chunks || []) {
      if (c.start_char == null || c.end_char == null) continue;
      for (const sp of spans) {
        const s = Math.max(c.start_char, sp.start);
        const e = Math.min(c.end_char, sp.end);
        if (s < e) (perPage[sp.page] ??= []).push(
          { s: s - sp.start, e: e - sp.start, chunk: c.chunk_index });
      }
    }
  }

  // small chunks: repeat the seam text inside each box; large chunks: render
  // the seam once, shaded, with the next box's border pulled up over it
  const meta = (qaData && qaData.chunk_metadata) || {};
  const size = meta.chunk_size ||
    Math.max(0, ...(qaData && qaData.chunks || []).map(c => (c.end_char ?? 0) - (c.start_char ?? 0)));
  const dupMode = size > 0 && size < 100;

  for (const n of order) {
    const el = pageTextEls[n];
    const text = pageTexts[n];
    if (!el || text == null) continue;
    const ranges = (perPage[n] || []).sort((a, b) => a.s - b.s || a.chunk - b.chunk);
    if (!ranges.length && !el.dataset.highlighted) continue;
    el.innerHTML = '';
    let cur = 0;  // end of the furthest range rendered so far
    ranges.forEach((r, k) => {
      const rs = Math.min(Math.max(r.s, 0), text.length);
      const re = Math.min(Math.max(r.e, rs), text.length);
      if (rs > cur) el.append(text.slice(cur, rs));
      if (dupMode) {
        const box = makeChunkBox(r.chunk, qaChunks);
        if (rs < cur) {  // repeat the seam text the previous box already showed
          const dup = document.createElement('span');
          dup.className = 'ov-dup';
          dup.textContent = text.slice(rs, Math.min(cur, re));
          box.appendChild(dup);
        }
        box.append(text.slice(Math.min(Math.max(cur, rs), re), re));
        el.appendChild(box);
      } else {
        const s = Math.min(Math.max(rs, cur), text.length);
        if (re > s) {
          const box = makeChunkBox(r.chunk, qaChunks);
          if (rs < cur) box.classList.add('overlaps-prev');
          const next = ranges[k + 1];
          const sharedFrom = next ? Math.min(Math.max(next.s, s), re) : re;
          box.append(text.slice(s, sharedFrom));
          if (sharedFrom < re) {
            const sh = document.createElement('span');
            sh.className = 'ov-shared';
            sh.textContent = text.slice(sharedFrom, re);
            box.appendChild(sh);
          }
          el.appendChild(box);
        }
      }
      cur = Math.max(cur, re);
    });
    el.append(text.slice(cur));
    if (ranges.length) {
      el.dataset.highlighted = '1';
      const details = el.closest('details');
      if (details) details.open = true;  // plumber full text hides in <details>
    } else {
      delete el.dataset.highlighted;
    }
  }
}

function makeChunkBox(idx, qaChunks) {  // caller appends the text content
  const box = document.createElement('span');
  box.className = 'chunk-box ' +
    (activeChunk === idx ? 'active' : qaChunks.has(idx) ? 'has-qa' : 'no-qa');
  box.dataset.chunk = idx;

  const head = document.createElement('span');
  head.className = 'chunk-box-head';
  const label = document.createElement('span');
  label.className = 'chunk-box-label';
  label.textContent = `Chunk_${idx}`;
  const check = document.createElement('input');
  check.type = 'checkbox';
  check.className = 'chunk-check';
  check.checked = checkedChunks.has(idx);
  check.onclick = ev => ev.stopPropagation();  // ticking must not highlight the box
  check.onchange = () => {
    if (check.checked) checkedChunks.add(idx); else checkedChunks.delete(idx);
    // a chunk spanning several pages has one box per page: keep them in sync
    document.querySelectorAll(`.chunk-box[data-chunk="${idx}"] .chunk-check`)
      .forEach(c => { c.checked = check.checked; });
    refreshGenButton();
  };
  head.append(label, check);
  box.appendChild(head);

  if (activeChunk === idx) {
    const gen = document.createElement('button');
    gen.className = 'chunk-gen';
    gen.textContent = 'Generate QA Pair';
    gen.disabled = generating;
    gen.onclick = ev => {
      ev.stopPropagation();
      generateQa([idx], ['direct', 'inference', 'paraphrased']);
    };
    box.appendChild(gen);
  }

  box.onclick = () => {
    activeChunk = activeChunk === idx ? null : idx;
    renderChunkHighlights();
  };
  return box;
}

function refreshGenButton() {
  const show = qaVisible && qaData ? '' : 'none';
  const gen = $('gen-btn');
  gen.style.display = show;
  gen.disabled = generating || checkedChunks.size === 0;
  const desel = $('deselect-btn');
  desel.style.display = show;
  desel.disabled = checkedChunks.size === 0;
}

$('deselect-btn').onclick = () => {
  checkedChunks.clear();
  document.querySelectorAll('.chunk-check').forEach(c => { c.checked = false; });
  refreshGenButton();
};

async function generateQa(chunks, types) {
  if (!qaData || generating || !current) return;
  generating = true;
  refreshGenButton();
  renderChunkHighlights();
  $('status').textContent = `Generating QA pairs for chunk(s) ${chunks.join(', ')}… (see logs)`;
  try {
    const resp = await fetch(
      `/api/documents/${current.type}/${current.run}/${current.name}/qa/generate`,
      { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chunks, types }) });
    if (!resp.ok) throw new Error(await resp.text());
    const data = await resp.json();
    generating = false;
    if (!qaVisible || !qaData) return;  // user closed the pane or document
    qaData = data;
    for (const c of chunks) checkedChunks.delete(c);
    activeChunk = null;
    $('status').textContent = '';
    buildQaPane();
  } catch (err) {
    generating = false;
    $('status').textContent = 'QA generation failed: ' + err.message;
  } finally {
    refreshGenButton();
    renderChunkHighlights();
  }
}

$('gen-btn').onclick = () => {
  if (checkedChunks.size) {
    generateQa([...checkedChunks], ['direct', 'inference', 'paraphrased']);
  }
};

async function loadEvalList(doc) {
  try {
    const resp = await fetch(
      `/api/documents/${doc.type}/${doc.run}/${doc.name}/evals` +
      `?qa_file=${encodeURIComponent(qaData.qa_file)}`);
    if (!resp.ok || current !== doc) return;
    evalList = await resp.json();
    if (qaVisible && qaData) buildQaPane();  // pane opened before the list arrived
  } catch (err) { /* dropdown just stays at None */ }
}

function evalLabel(e) {
  const ts = (e.file.match(/^eval_(\d{8}_\d{6})_/) || [])[1] || '';
  return [ts, e.db_type, e.embedding_model].filter(Boolean).join(' · ');
}

async function selectEval(file) {
  evalSelected = file;
  evalData = null;
  if (file && current) {
    try {
      const resp = await fetch(
        `/api/documents/${current.type}/${current.run}/${current.name}/evals/${file}`);
      if (!resp.ok) throw new Error(await resp.text());
      evalData = await resp.json();
    } catch (err) {
      evalSelected = '';
      $('status').textContent = 'Failed to load eval file: ' + err.message;
    }
  }
  if (qaVisible && qaData) buildQaPane();
}

/* The eval's question record for one QA pair: exact question text first,
   then (chunk, type) for pairs reworded since the eval ran. */
function evalLookup(chunkIndex, pair) {
  if (!evalData) return null;
  const qs = evalData.questions || [];
  return qs.find(q => q.chunk_index === chunkIndex && q.question === pair.question)
      || qs.find(q => q.chunk_index === chunkIndex && q.question_type === pair.question_type)
      || null;
}

function buildQaPane() {
  const pane = $('qa-pane');
  pane.innerHTML = '';

  const bar = document.createElement('div');
  bar.id = 'eval-bar';
  const label = document.createElement('span');
  label.textContent = 'Eval:';
  const sel = document.createElement('select');
  const none = document.createElement('option');
  none.value = '';
  none.textContent = 'None';
  sel.appendChild(none);
  for (const e of evalList) {
    const opt = document.createElement('option');
    opt.value = e.file;
    opt.textContent = evalLabel(e);
    sel.appendChild(opt);
  }
  sel.value = evalSelected;
  sel.onchange = () => selectEval(sel.value);
  bar.append(label, sel);
  pane.appendChild(bar);

  const head = document.createElement('h2');
  head.textContent = `QA pairs — ${qaData.chunk_run}/${qaData.qa_file.split('/').pop()}`;
  pane.appendChild(head);
  // generate --add keeps the file sorted, but old files may predate that:
  // sort for display; itemIndex keeps each item's position in the file,
  // which is what the delete endpoint addresses
  const ordered = qaData.items.map((item, i) => [item, i])
    .sort((a, b) => a[0].chunk_index - b[0].chunk_index);
  for (const [item, itemIndex] of ordered) {
    const div = document.createElement('div');
    div.className = 'qa-item';
    const pageLabel = item.start_page === item.end_page
      ? `Page ${item.start_page}` : `Pages ${item.start_page}–${item.end_page}`;
    const h = document.createElement('div');
    h.className = 'qa-item-head';
    h.innerHTML = `<span class="qa-chunk">Chunk_${item.chunk_index}</span><span class="qa-page">${pageLabel}</span>`;
    const delAll = document.createElement('button');
    delAll.className = 'qa-del';
    delAll.textContent = 'Delete Pairs';
    delAll.onclick = ev => {
      ev.stopPropagation();
      deleteQaPair(delAll, item, itemIndex, null, null);
    };
    h.appendChild(delAll);
    div.appendChild(h);
    (item.qa_pairs || []).forEach((pair, pairIndex) => {
      const p = document.createElement('div');
      p.className = 'qa-pair';
      const head = document.createElement('div');
      head.className = 'qa-pair-head';
      const type = document.createElement('span');
      type.className = 'qa-type';
      type.textContent = pair.question_type;
      const del = document.createElement('button');
      del.className = 'qa-del';
      del.textContent = 'Delete QA Pair';
      del.onclick = ev => {
        ev.stopPropagation();
        deleteQaPair(del, item, itemIndex, pair, pairIndex);
      };
      head.append(type, del);
      const q = document.createElement('div');
      q.className = 'qa-q';
      q.textContent = pair.question;
      const a = document.createElement('div');
      a.className = 'qa-a';
      a.textContent = pair.answer;
      p.append(head, q, a);
      if (evalData) {
        const line = document.createElement('div');
        line.className = 'qa-eval';
        const ev = evalLookup(item.chunk_index, pair);
        if (!ev) {
          line.textContent = '(not in this eval)';
        } else {
          const rank = document.createElement('span');
          rank.className = 'qa-rank' + (ev.gold_rank == null ? ' miss' : '');
          rank.textContent = 'Rank: ' + (ev.gold_rank ??
            `not in top ${evalData.metadata.top_k ?? (ev.retrieved || []).length}`);
          const full = document.createElement('button');
          full.textContent = 'View Full Results';
          full.onclick = evClick => {
            evClick.stopPropagation();
            showEvalResults(ev, pair, full);
          };
          line.append(rank, full);
        }
        p.appendChild(line);
      }
      div.appendChild(p);
    });
    div.onclick = () => {
      const row = $(`page-row-${item.start_page}`);
      if (row) row.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
    pane.appendChild(div);
  }
}

/* Anchored popovers: each opens next to its trigger button. Level 0 is the
   results list, level 1 the chunk preview opened from inside it; opening at a
   level replaces that level and above, clicking elsewhere closes them all. */
function closePopovers(level = 0) {
  document.querySelectorAll('.popover').forEach(p => {
    if (+p.dataset.level >= level) p.remove();
  });
}
document.addEventListener('click', ev => {
  if (!ev.target.closest('.popover')) closePopovers();
});
// popovers are viewport-fixed: close them when their anchors scroll away
$('qa-pane').addEventListener('scroll', () => closePopovers());

function openPopover(anchor, level, title, buildBody) {
  closePopovers(level);
  const pop = document.createElement('div');
  pop.className = 'popover';
  pop.dataset.level = level;
  // clicking a popover closes the ones stacked above it (e.g. clicking the
  // results list dismisses the chunk preview); openers must stopPropagation
  pop.addEventListener('click', () => closePopovers(level + 1));
  const head = document.createElement('div');
  head.className = 'popover-head';
  const h = document.createElement('h3');
  h.textContent = title;
  const close = document.createElement('button');
  close.textContent = '×';
  close.onclick = () => closePopovers(level);
  head.append(h, close);
  const body = document.createElement('div');
  body.className = 'popover-body';
  body.addEventListener('scroll', () => closePopovers(level + 1));
  buildBody(body);
  pop.append(head, body);
  document.body.appendChild(pop);

  // below the button if it fits, else above; clamped to the viewport
  const r = anchor.getBoundingClientRect();
  const pw = pop.offsetWidth, ph = pop.offsetHeight;
  let top = r.bottom + 4;
  if (top + ph > window.innerHeight - 8 && r.top - ph - 4 >= 8) top = r.top - ph - 4;
  pop.style.top = Math.max(8, Math.min(top, window.innerHeight - ph - 8)) + 'px';
  pop.style.left = Math.max(8, Math.min(r.left, window.innerWidth - pw - 8)) + 'px';
}

function showEvalResults(ev, pair, anchor) {
  openPopover(anchor, 0, `Retrieved chunks — ${pair.question}`, body => {
    for (const r of ev.retrieved || []) {
      const row = document.createElement('div');
      row.className = 'rank-row';
      const no = document.createElement('span');
      no.className = 'rank-no';
      no.textContent = `#${r.rank}`;
      const btn = document.createElement('button');
      btn.textContent = `Chunk_${r.chunk_index}`;
      btn.onclick = ev => {
        ev.stopPropagation();  // or the results popover would close it again
        showChunkPreview(r.chunk_index, btn);
      };
      row.append(no, btn);
      if (r.chunk_index === ev.chunk_index) {
        const gold = document.createElement('span');
        gold.className = 'gold';
        gold.textContent = 'gold';
        row.appendChild(gold);
      }
      const score = document.createElement('span');
      score.className = 'rank-score';
      score.textContent = r.score != null ? r.score.toFixed(4) : '';
      row.appendChild(score);
      body.appendChild(row);
    }
    if (ev.gold_rank == null) {
      const note = document.createElement('p');
      note.style.cssText = 'margin-top:10px;color:#d93025;font-size:12px;';
      note.textContent = `Gold chunk Chunk_${ev.chunk_index} was not retrieved.`;
      body.appendChild(note);
    }
  });
}

function showChunkPreview(idx, anchor) {
  const info = (evalData && evalData.chunk_texts[idx]) || null;
  openPopover(anchor, 1, `Chunk_${idx}`, body => {
    const link = document.createElement('a');
    link.href = '#';
    link.textContent = 'Scroll to chunk in document';
    link.onclick = ev => { ev.preventDefault(); scrollToChunk(idx); };
    body.appendChild(link);
    const text = document.createElement('div');
    text.className = 'chunk-preview';
    text.textContent = info ? info.text : '(chunk text unavailable)';
    body.appendChild(text);
  });
}

function scrollToChunk(idx) {  // popovers stay open; the document scrolls behind them
  const box = document.querySelector(`.chunk-box[data-chunk="${idx}"]`);
  if (box) return box.scrollIntoView({ behavior: 'smooth', block: 'center' });
  // no box rendered (e.g. page not extracted): fall back to the chunk's page
  const c = ((qaData && qaData.chunks) || []).find(c => c.chunk_index === idx)
    || (evalData && evalData.chunk_texts[idx]);
  const row = c && $(`page-row-${c.start_page}`);
  if (row) row.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

async function deleteQaPair(button, item, itemIndex, pair, pairIndex) {
  if (!qaData || !current) return;
  button.disabled = true;
  try {
    const resp = await fetch(
      `/api/documents/${current.type}/${current.run}/${current.name}/qa/delete-pair`,
      { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          qa_file: qaData.qa_file,
          item_index: itemIndex,
          pair_index: pairIndex,  // null deletes all of the chunk's pairs
          chunk_index: item.chunk_index,
          question_type: pair ? pair.question_type : null,
        }) });
    if (!resp.ok) throw new Error(await resp.text());
    qaData = await resp.json();
    buildQaPane();
    renderChunkHighlights();
  } catch (err) {
    button.disabled = false;
    $('status').textContent = 'Delete failed: ' + err.message;
  }
}

$('qa-btn').onclick = () => {
  if (!qaData) return;
  qaVisible = !qaVisible;
  $('qa-pane').hidden = !qaVisible;
  $('qa-btn').textContent = qaVisible ? 'Hide QA Pairs' : 'View QA Pairs';
  if (!qaVisible) { activeChunk = null; checkedChunks.clear(); }
  else buildQaPane();
  refreshGenButton();
  renderChunkHighlights();
};

function showList() {
  current = null;
  ocrState = {};
  qaData = null;
  qaVisible = false;
  pageTexts = {};
  pageTextEls = {};
  checkedChunks = new Set();
  activeChunk = null;
  evalList = [];
  evalData = null;
  evalSelected = '';
  $('qa-btn').style.display = 'none';
  $('qa-pane').hidden = true;
  refreshGenButton();
  refreshExtractAll();
  $('viewer').style.display = 'none';
  $('back').style.display = 'none';
  $('list-view').style.display = 'block';
  $('title').textContent = 'Scanned documents';
  loadDocuments();
}

$('back').onclick = showList;

/* Extract all: one OCR run over every page still missing easyocr data */
$('extract-all').onclick = async () => {
  const doc = current;
  if (!doc) return;
  const btn = $('extract-all');
  btn.disabled = true;
  btn.textContent = 'Extracting all… (see logs)';
  try {
    const resp = await fetch(`/api/documents/${doc.run}/${doc.name}/ocr`, { method: 'POST' });
    if (!resp.ok) throw new Error(await resp.text());
    const ocr = await resp.json();
    if (current !== doc) return;  // user navigated away meanwhile
    ocrState = ocr;
    for (const [pageNo, text] of Object.entries(ocr)) {
      const row = $(`page-row-${pageNo}`);
      if (row && text !== null) {
        setOcrText(row, text);
        pageTexts[pageNo] = text;
      }
    }
    renderChunkHighlights();
  } catch (err) {
    $('status').textContent = 'Extract all failed: ' + err.message;
  } finally {
    btn.disabled = false;
    refreshExtractAll();
  }
};

/* Upload: button opens a method menu; picking one opens the file dialog */
let uploadMethod = 'pdf2image';
$('upload-btn').onclick = ev => {
  ev.stopPropagation();
  $('upload-menu').hidden = !$('upload-menu').hidden;
};
document.addEventListener('click', () => { $('upload-menu').hidden = true; });
document.querySelectorAll('#upload-menu button').forEach(btn => {
  btn.onclick = () => {
    uploadMethod = btn.dataset.method;
    $('upload-menu').hidden = true;
    $('file-input').click();
  };
});

$('file-input').onchange = async () => {
  const file = $('file-input').files[0];
  if (!file) return;
  $('status').textContent = `Converting ${file.name} (${uploadMethod})…`;
  $('upload-btn').disabled = true;
  try {
    const form = new FormData();
    form.append('pdf', file);
    form.append('method', uploadMethod);
    const resp = await fetch('/upload', { method: 'POST', body: form });
    if (!resp.ok) throw new Error(await resp.text());
    const doc = await resp.json();
    $('status').textContent = '';
    openDocument(doc);
  } catch (err) {
    $('status').textContent = 'Upload failed: ' + err.message;
  } finally {
    $('upload-btn').disabled = false;
    $('file-input').value = '';
  }
};

/* Draggable divider: adjusts left pane width, clamped 10-60% */
const divider = $('divider');
divider.addEventListener('mousedown', e => {
  e.preventDefault();
  divider.classList.add('dragging');
  const onMove = ev => {
    const pct = (ev.clientX / $('viewer').clientWidth) * 100;
    $('thumbs').style.width = Math.min(60, Math.max(10, pct)) + '%';
  };
  const onUp = () => {
    divider.classList.remove('dragging');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
});

/* Bottom log pane: SSE stream with auto-scroll and drag-to-resize height */
const logEl = $('log');
new EventSource('/logs/stream').onmessage = e => {
  const atBottom = logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight < 10;
  const line = document.createElement('div');
  line.textContent = e.data;
  logEl.appendChild(line);
  if (atBottom) logEl.scrollTop = logEl.scrollHeight;
};
$('log-clear').onclick = () => { logEl.innerHTML = ''; };

const logDivider = $('log-divider');
logDivider.addEventListener('mousedown', e => {
  e.preventDefault();
  logDivider.classList.add('dragging');
  const onMove = ev => {
    const h = window.innerHeight - ev.clientY - logDivider.offsetHeight;
    $('log-pane').style.height = Math.min(window.innerHeight * 0.6, Math.max(60, h)) + 'px';
  };
  const onUp = () => {
    logDivider.classList.remove('dragging');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
});

loadDocuments();
</script>
</body>
